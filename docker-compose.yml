version: '3.8'

services:
  api_server:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - USE_DOCKER_SANDBOX=${USE_DOCKER_SANDBOX:-true}
    volumes:
      - ./.chroma_db:/app/.chroma_db
      # SECURITY: Docker socket access lets this container control the host daemon.
      # Required for isolated code execution (sandbox/code_runner.py).
      # Linux/macOS Docker Desktop: /var/run/docker.sock:/var/run/docker.sock
      # Windows Docker Desktop (WSL2): same path inside the Linux VM is typical.
      # Windows native pipe: see Docker Desktop docs for npipe:// mapping.
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - code_net

  # Future/scaling option: Qdrant vector store.
  # Current application code uses ChromaDB locally (./.chroma_db) — see database/vector_store.py.
  qdrant_db:
    image: qdrant/qdrant:v1.8.4
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    networks:
      - code_net

networks:
  code_net:
    driver: bridge