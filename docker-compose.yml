version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - code_net

  api_server:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5-coder:7b}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      - USE_DOCKER_SANDBOX=${USE_DOCKER_SANDBOX:-true}
      - SANDBOX_FAIL_CLOSED=${SANDBOX_FAIL_CLOSED:-false}
      - MAX_CODE_BYTES=${MAX_CODE_BYTES:-65536}
      - API_KEY=${API_KEY:-}
    volumes:
      - ./.chroma_db:/app/.chroma_db
      - ./.hf_cache:/root/.cache/huggingface
      # SECURITY: Docker socket access lets this container control the host daemon.
      # Required for isolated code execution (sandbox/code_runner.py).
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - ollama
    networks:
      - code_net

  # Future/scaling option: Qdrant vector store.
  # Current application code uses ChromaDB locally (./.chroma_db) — see database/vector_store.py.
  qdrant_db:
    image: qdrant/qdrant:v1.8.4
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    networks:
      - code_net

networks:
  code_net:
    driver: bridge

volumes:
  ollama_data: