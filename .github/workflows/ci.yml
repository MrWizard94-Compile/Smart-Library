name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: smart_code_lib/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r smart_code_lib/requirements-dev.txt

      - name: Run tests
        run: python -m pytest tests/ -v